<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Analysis Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">
<div class="container">
    <a th:href="@{/(lang=${lang})}" class="btn btn-sm btn-outline-secondary mb-4">← 返回</a>
    <h2 class="mb-4">实时趋势分析</h2>

    <div th:if="${#lists.isEmpty(productList)}" class="alert alert-warning">
        未发现数据，请检查根目录 rakuten.html 文件。
    </div>

    <div th:each="p : ${productList}" class="card mb-3 p-3">
        <div class="row">
            <div class="col-1 fw-bold" th:text="${p.rank}"></div>
            <div class="col-11">
                <h5 th:text="${p.name}"></h5>
                <div class="bg-light p-2 mt-2">
                    <small class="text-primary fw-bold">AI INSIGHT:</small>
                    <p class="mb-0" th:text="${p.painPoint}"></p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
