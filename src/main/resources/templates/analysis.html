<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trend Analysis - 楽天データ分析</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #4f46e5;
            --deep-purple: #312e81;
            --accent-purple: #818cf8;
            --soft-bg: #f5f7ff;
            --text-main: #1e293b;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--soft-bg);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, var(--deep-purple) 0%, var(--primary-blue) 100%);
            color: white;
            padding: 25px 0;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 40px;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: var(--primary-blue);
            font-weight: 600;
            margin-bottom: 25px;
            transition: transform 0.2s;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        /* ── カード（クリック可能に変更） ── */
        .product-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 35px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(79, 70, 229, 0.1);

            /* 追加: クリック可能スタイル */
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -8px rgba(79, 70, 229, 0.2);
            border-color: rgba(79, 70, 229, 0.35);
        }

        .product-card::after {
            content: '詳細を見る →';
            position: absolute;
            bottom: 18px;
            right: 24px;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-purple);
            opacity: 0;
            transition: opacity 0.2s ease;
            letter-spacing: 0.5px;
        }

        .product-card:hover::after {
            opacity: 1;
        }

        .product-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--deep-purple);
            margin-bottom: 20px;
            border-bottom: 2px solid var(--soft-bg);
            padding-bottom: 10px;
        }

        .ai-box {
            background-color: #eef2ff;
            border-left: 5px solid var(--primary-blue);
            padding: 20px;
            border-radius: 0 12px 12px 0;
            margin: 20px 0;
        }

        .ai-box h4 {
            margin-top: 0;
            color: var(--primary-blue);
            font-size: 15px;
            display: flex;
            align-items: center;
            letter-spacing: 0.5px;
        }

        .ai-box h4::before {
            content: '⚡';
            margin-right: 8px;
        }

        .review-list h5 {
            color: #64748b;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1.2px;
            margin: 25px 0 15px 0;
        }

        .review-item {
            background-color: #fcfcfd;
            border: 1px solid #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 14px;
            color: #475569;
        }

        footer {
            text-align: center;
            padding: 50px 0;
            color: #94a3b8;
            font-size: 12px;
        }

        /* ══════════════════════════════
           モーダル関連スタイル（新規追加）
        ══════════════════════════════ */

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 12, 40, 0.55);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-overlay.active {
            display: flex;
            animation: overlayIn 0.25s ease forwards;
        }

        @keyframes overlayIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .modal-box {
            background: #ffffff;
            border-radius: 20px;
            width: 100%;
            max-width: 680px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 30px 60px -10px rgba(49, 46, 129, 0.35);
            animation: modalIn 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            position: relative;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translateY(24px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-box.closing {
            animation: modalOut 0.2s ease forwards;
        }

        @keyframes modalOut {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to   { opacity: 0; transform: translateY(16px) scale(0.97); }
        }

        .modal-header {
            background: linear-gradient(135deg, var(--deep-purple) 0%, var(--primary-blue) 100%);
            padding: 24px 30px 20px;
            border-radius: 20px 20px 0 0;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
        }

        .modal-header-title {
            color: white;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.4;
            flex: 1;
        }

        .modal-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s ease, transform 0.15s ease;
            line-height: 1;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 28px 30px 30px;
        }

        .modal-body .ai-box {
            margin-top: 0;
        }

        .modal-body .review-list h5 {
            margin-top: 28px;
        }

        /* スクロールバーの見た目を整える */
        .modal-box::-webkit-scrollbar {
            width: 6px;
        }
        .modal-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .modal-box::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<header>
    <h1>Rakuten Insight Dashboard</h1>
</header>

<div class="container">
    <a href="/" class="back-link">← Back to Ranking</a>

    <!--
        変更点: product-card に onclick を追加し、モーダルを開くようにした。
        Thymeleaf の th:each / th:text / th:if などの既存ロジックはすべてそのまま保持。
        各カードに data-index を付与して、対応するモーダルを特定する。
    -->
    <div th:each="product, iter : ${products}"
         class="product-card"
         th:attr="data-index=${iter.index}"
         onclick="openModal(this.getAttribute('data-index'))">

        <div class="product-title" th:text="${product.name}">Product Name</div>

        <div class="ai-box">
            <h4>AI MARKET INSIGHT</h4>
            <div th:text="${product.aiPrediction}">Analysis content...</div>
        </div>

        <div class="review-list">
            <h5>REAL USER REVIEWS</h5>
            <div th:if="${#lists.isEmpty(product.reviews)}">
                <p style="color: #94a3b8; font-style: italic;">No data available.</p>
            </div>
            <div th:each="review : ${product.reviews}" class="review-item">
                <span th:text="${review}">Review text</span>
            </div>
        </div>
    </div>
</div>

<footer>
    &copy; 2026 AI Trend Analysis System | Data sourced from Rakuten Ichiba
</footer>


<!--
    ══════════════════════════════════════════════════
    モーダル: product-card と同じ Thymeleaf ループで生成。
    既存の th:each / th:text / th:if ロジックを完全保持。
    ══════════════════════════════════════════════════
-->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal-box" id="modal-box">
        <div class="modal-header">
            <div class="modal-header-title" id="modal-title">Product Name</div>
            <button class="modal-close" onclick="closeModal()" aria-label="閉じる">✕</button>
        </div>
        <div class="modal-body" id="modal-body">
            <!-- JS によって動的に内容を挿入 -->
        </div>
    </div>
</div>


<!--
    ══════════════════════════════════════════════════
    Thymeleaf がレンダリングした各商品データを
    JavaScript から参照できるよう JSON として埋め込む。
    これにより、モーダルはサーバーへの追加リクエストなしに動作する。
    ══════════════════════════════════════════════════
-->
<script th:inline="javascript">
    /*<![CDATA[*/
    const PRODUCTS = /*[[${products}]]*/ [];
    /*]]>*/
</script>

<script>
    // ── モーダルを開く ──────────────────────────────
    function openModal(index) {
        const product = PRODUCTS[index];
        if (!product) return;

        // タイトル
        document.getElementById('modal-title').textContent = product.name || '';

        // AI インサイト + レビューリストを組み立てる
        const aiText = product.aiPrediction || '';
        const reviews = Array.isArray(product.reviews) ? product.reviews : [];

        let reviewsHtml = '';
        if (reviews.length === 0) {
            reviewsHtml = '<p style="color:#94a3b8;font-style:italic;">No data available.</p>';
        } else {
            reviewsHtml = reviews
                .map(r => `<div class="review-item"><span>${escapeHtml(r)}</span></div>`)
                .join('');
        }

        document.getElementById('modal-body').innerHTML = `
            <div class="review-list">
                <h5>REAL USER REVIEWS</h5>
                ${reviewsHtml}
            </div>
        `;

        // モーダル表示
        const overlay = document.getElementById('modal-overlay');
        const box = document.getElementById('modal-box');
        box.classList.remove('closing');
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    // ── モーダルを閉じる ────────────────────────────
    function closeModal() {
        const overlay = document.getElementById('modal-overlay');
        const box = document.getElementById('modal-box');

        box.classList.add('closing');
        setTimeout(() => {
            overlay.classList.remove('active');
            box.classList.remove('closing');
            document.body.style.overflow = '';
        }, 200);
    }

    // オーバーレイ背景クリックで閉じる
    function handleOverlayClick(event) {
        if (event.target === document.getElementById('modal-overlay')) {
            closeModal();
        }
    }

    // Esc キーで閉じる
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });

    // XSS 対策のサニタイズ
    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }
</script>

</body>
</html>
